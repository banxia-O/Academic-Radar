# Academic Radar 配置文件（PRD §2.3）
# 修改后下次 cron 运行自动生效，无需重启。

# ===== 研究方向关键词 =====
# 命中至少一个才进入评分流程
topics:
  en:
    - "radiotherapy immunotherapy"
    - "immune checkpoint inhibitor radiation"
    - "FLASH radiotherapy"
    - "cGAS-STING radiation"
    - "abscopal effect"
    # 按需添加
  zh:
    - "放疗 免疫治疗"
    - "FLASH放疗"
    - "免疫原性细胞死亡"
    # 按需添加

# 研究方向简述（用于 LLM 评分 prompt，PRD §2.4 Step 2）
research_focus: |
  放疗与免疫治疗联合，重点关注 FLASH 放疗、免疫检查点抑制剂联合放疗、
  cGAS-STING 通路、远隔效应等机制与临床转化。

# ===== 追踪作者/机构 =====
# 命中即保留，不需同时命中 topic
authors:
  - "Last F"          # 按需替换为目标作者
  # - "机构名称"      # 也可追踪机构

# ===== 排除词 =====
exclude:
  - "veterinary"
  - "dental"
  - "pediatric"

# ===== 检索频率（PRD §2.1）=====
# 脚本自节流：cron 触发后若距上次成功不足 frequency×0.9 则自动跳过，
# 所以多数频率改这里即可生效，不必重装 cron（详见 AGENT.md §4）。
schedule:
  frequency: daily          # twice_daily | daily | every_3_days | weekly | biweekly | monthly | every_4_hours | custom
  custom_days: 7            # 正整数，仅 frequency:custom 时生效
  times: ["08:00"]          # 检索运行时间（HH:MM 24h 制）；twice_daily 时填两个；every_4_hours 时忽略

# ===== 时区 =====
timezone: "Asia/Shanghai"

# ===== 数据源开关 =====
sources:
  pubmed: true
  semantic_scholar: true
  openalex: true
  biorxiv: true
  medrxiv: true
  arxiv: true
  x_search: true
  rss: true

# ===== API 配置 =====
api_keys:
  pubmed_api_key: ""          # 可选，填写后提高请求频率
  semantic_scholar_key: ""    # 可选，填写后提高请求频率
  openalex_mailto: ""         # 填写邮箱进入 polite pool
  crossref_mailto: ""         # 同上

# ===== LLM 配置（OpenAI 兼容格式） =====
llm:
  base_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o-mini"
  timeout: 30

# ===== RSS 订阅 =====
rss_feeds: []
  # - name: "期刊名称"
  #   url: "https://..."

# ===== 推送渠道 =====
push:
  channel: "webhook"          # webhook / telegram / slack / email
  webhook_url: ""
  # telegram_bot_token: ""
  # telegram_chat_id: ""

# ===== 输出限制 =====
output:
  max_items: 15               # PRD §2.4 Step 6
  format: "plain"             # plain / markdown

# ===== 跨周期去重 =====
# 避免把上次已推送的文章再推一遍（窗口边界、预印本延迟索引时常见）。
# 评分前先比对近 lookback_days 天的存档，命中则直接跳过（不进 LLM，省 token）。
dedup:
  cross_period: true
  lookback_days: 30           # 回溯天数；受 archive_retention_days 限制（存档已删的查不到）

# ===== 存档保留天数 =====
archive_retention_days: 30
