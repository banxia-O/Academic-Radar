# ============================================================
# Academic Radar 关键词配置模板
# ============================================================
# 使用方法：告诉 agent/AI「我要关注 XX 方向」，agent 按本模板的六层结构生成完整关键词配置，
#           填好后把 topics / authors / exclude / schedule 段并入 academic_radar_config.yaml。
#
# 更新日期：{{DATE}}
# 研究方向：{{DIRECTION}}
#
# ------------------------------------------------------------
# 填充指南（给 agent/AI 看的）
# ------------------------------------------------------------
# 收到用户的研究方向后，按以下六层结构生成关键词：
#
# 第1层 疾病/领域本体：疾病名称、亚型、基因特征、分期分型的标准术语
#        → 来源：WHO 分类、NCCN 命名、ICD 编码对应名称
#        → 中英文都要，缩写可能有歧义时加注释
#
# 第2层 核心药物/干预手段：该领域在研和已上市的关键药物/技术
#        → 包括：通用名、商品名、代号（如 NHWD-870）、靶点名
#        → 覆盖同靶点竞品，不只写用户提到的那一个
#
# 第3层 临床试验/联合方案：正在进行的重要试验设计
#        → 格式："药物A + 药物B"、"技术 + 瘤种 + clinical trial"
#        → 关注联合用药、新适应症拓展
#
# 第4层 机制/通路：该方向涉及的分子机制和信号通路
#        → 来源：近 2 年高引综述中的核心通路关键词
#        → 与用户其他研究兴趣的交叉点也纳入
#
# 第5层 诊断/病理/生物标志物：诊断标准、分子检测、预后标志物
#        → IHC、FISH、NGS panel 相关术语
#        → 新兴 biomarker
#
# 第6层 排除词：与关键词字面重叠但不相关的领域
#        → 常见歧义词、非人类研究（除非用户需要）、无关学科
#
# 生成规则：
# - 英文关键词为主，中文为辅（PubMed/bioRxiv 以英文为主）；生成的英文检索词附中文翻译（给用户看）
# - 每层 3-15 个词，不要过多导致噪音
# - 药物类尽量覆盖同靶点所有在研分子，不遗漏竞品
# - 生成后向用户确认，特别是排除词（可能误伤）
#
# 关于结构：本模板的 topics 用六层嵌套结构，便于系统化思考。
#   radar_main.load_config() 会自动把各层的 en/zh 展平合并到 topics.en / topics.zh，
#   下游 fetcher 和 keyword_filter 无需关心分层。也兼容直接写扁平的 topics.en / topics.zh。
# ============================================================

topics:
  # ----- 第1层：疾病/领域本体 -----
  disease:
    en:
      - ""    # 疾病标准英文名
      - ""    # 亚型/变异型
      - ""    # 相关基因/融合/突变
    zh:
      - ""    # 中文标准名
      - ""    # 中文别名/俗称

  # ----- 第2层：核心药物/干预手段 -----
  therapeutics:
    en:
      - ""    # 药物通用名
      - ""    # 药物代号
      - ""    # 靶点名 + inhibitor/agonist/antibody
      - ""    # 同靶点竞品
    zh:
      - ""    # 中文药物名/靶点名

  # ----- 第3层：临床试验/联合方案 -----
  clinical_trials:
    en:
      - ""    # "药物 + 瘤种 + clinical trial"
      - ""    # "药物A + 药物B + combination"
      - ""    # "药物 + immunotherapy/chemotherapy/radiotherapy"
    zh:
      - ""    # 中文临床试验相关检索词

  # ----- 第4层：机制/通路 -----
  mechanisms:
    en:
      - ""    # 核心信号通路
      - ""    # 分子机制关键词
      - ""    # 微环境/免疫相关机制
    zh:
      - ""

  # ----- 第5层：诊断/病理/生物标志物 -----
  diagnostics:
    en:
      - ""    # IHC/FISH/NGS 相关
      - ""    # 病理诊断术语
      - ""    # 预后/预测 biomarker
    zh:
      - ""

# ===== 追踪作者/机构 =====
# 填入该领域的核心研究者和机构。命中 author 即保留，不需要同时命中 topic。
authors:
  # 用户所在课题组
  - ""      # 导师
  - ""      # 组内成员
  - ""      # 所在机构英文名
  # 领域核心人物（建议 3-10 人）
  - ""      # 领域奠基人/高引作者
  - ""      # 关键临床试验 PI
  # 核心药企/机构
  - ""      # 药物开发方

# ===== 排除词 =====
# 减少噪音，特别注意关键词的歧义。
exclude:
  - "veterinary"
  - "plant biology"
  - "food science"
  - ""      # 该方向特有的歧义排除词

# ===== 检索频率 =====
# 取代旧的 mode 字段。详见 academic_radar_config.yaml 的 schedule 段说明与 AGENT.md §2.5。
schedule:
  frequency: daily          # twice_daily | daily | every_3_days | weekly | biweekly | monthly | every_4_hours | custom
  custom_days: 7            # 仅 frequency:custom 时生效
  times: ["08:00"]          # 检索运行时间；twice_daily 时填两个

# ===== 会议日历 =====
# 该领域重要会议；会期内建议把 schedule.frequency 临时切到 every_4_hours，会后切回。
# 仅供 agent 参考，脚本不读取此字段。格式：会议名 | 通常时间
conferences:
  - ""    # 例：ASCO | 每年 5-6 月
  - ""    # 例：ESMO | 每年 9-10 月
